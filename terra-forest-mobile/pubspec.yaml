name: terra_forest_mobile
description: Terra Forest - Digital MRV Platform for Vietnam Forestry
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.0

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.6.2

  # Network
  dio: ^5.7.0
  connectivity_plus: ^6.1.2
  crypto: ^3.0.6

  # Local Storage & Offline
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  shared_preferences: ^2.3.4

  # Maps & Location (flutter_map is pure Dart — zero native build issues)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2

  # Permissions
  permission_handler: ^11.3.1

  # Camera & Media
  image_picker: ^1.1.2

  # Auth & Security
  flutter_secure_storage: ^9.2.4
  local_auth: ^2.3.0

  # Notifications (Firebase optional — no google-services.json required)
  firebase_core: ^3.12.1

  # Sync & OTA (background sync uses in-app Timer — no native plugin)
  url_launcher: ^6.3.1
  package_info_plus: ^8.1.3
  device_info_plus: ^11.2.0

  # Utilities
  uuid: ^4.5.1
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true

  # Using default Material fonts (Roboto) which support Vietnamese characters
  # No custom font bundle needed
